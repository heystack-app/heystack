name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: dropdown
    id: deploy
    attributes:
      label: How are you running heystack?
      options:
        - docker compose
        - local dev (npm run dev)
        - k3s / other
  - type: input
    id: models
    attributes:
      label: Models
      placeholder: "e.g. embedding bge-m3, chat llama3.1:8b"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant logs or screenshots.
