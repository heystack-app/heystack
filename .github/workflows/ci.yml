name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

# Note: the retrieval eval (`npm run eval`) needs Ollama + Postgres + the seeded
# Demo data, so it runs locally / on a self-hosted runner, not in this workflow.
